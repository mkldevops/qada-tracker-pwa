        <p>
          Les prières qada sont les prières obligatoires (salah) qu'un musulman a manquées et doit rattraper.
          Selon la jurisprudence islamique, il est obligatoire de récupérer ces prières dès que possible.
          Que vous ayez manqué quelques semaines ou plusieurs années de prières, Qada Tracker vous aide à
          organiser votre rattrapage de façon systématique et progressive, sans pression.

            par jour ou par semaine. L'application suggère un rythme réaliste sur un horizon de 5 ans.

        <section lang="en">
          <h2>Qada Tracker — Islamic Missed Prayer Recovery App</h2>
          <p>
            Qada Tracker is a free Islamic progressive web app (PWA) designed to help Muslims track and
            systematically recover missed obligatory prayers (قضاء — qada). Fully offline, no account
            required, no ads, no data collection. Available in French, English, and Arabic with full
            right-to-left (RTL) layout support. Install it directly on iOS, Android, or desktop as a
            native app.
          </p>

          <h3>What are qada prayers?</h3>
          <p>
            Qada prayers are missed obligatory prayers (salah) that a Muslim must make up as soon as
            possible. All four major Sunni jurisprudential schools — Hanafi, Maliki, Shafi'i, and
            Hanbali — agree that recovering missed prayers is an Islamic obligation. One full year of
            missed prayers represents approximately 1,825 prayers to recover (5 daily prayers × 365 days).
            Whether you have missed a few weeks or many years of prayers, Qada Tracker helps you organize
            your recovery in a structured, pressure-free way.
          </p>

          <h3>Key Features</h3>
          <ul>
            <li>Track five daily prayers: Fajr, Dhuhr, Asr, Maghrib, Isha</li>
            <li>Automatic prayer debt calculation based on missed years and puberty age</li>
            <li>Recovery sessions with real-time rak'at counter</li>
            <li>Automatic sujood detection via phone proximity sensor</li>
            <li>Women's menses (hayd) day deduction for accurate calculation</li>
            <li>Progress statistics and activity heatmap visualization</li>
            <li>Daily or weekly recovery goal setting</li>
            <li>French, English, Arabic (RTL) interface</li>
            <li>Installable on iOS, Android, and desktop (PWA)</li>
            <li>100% free — no ads, no subscription, no account</li>
          </ul>

          <h3>How It Works</h3>
          <p>Getting started with Qada Tracker takes less than a minute:</p>
          <ol>
            <li>
              <strong>Configure your debt</strong> — Enter the number of years you missed prayers and
              your age at puberty. The app automatically calculates your total prayer debt broken down
              by each of the five daily prayers.
            </li>
            <li>
              <strong>Set your goal</strong> — Choose how many prayers you want to recover per day or
              per week. The app suggests a realistic pace over a 5-year horizon.
            </li>
            <li>
              <strong>Log your sessions</strong> — For each session, select a prayer and perform your
              rak'ats. The app can automatically detect your sujood via your phone's proximity sensor.
              Your progress is saved instantly on your device.
            </li>
          </ol>

          <h3>Privacy First</h3>
          <p>
            Privacy is not an afterthought in Qada Tracker — it is the foundation. All your data
            (missed prayers, session history, statistics, goals) is stored exclusively on your device
            using IndexedDB, a browser-integrated database. Nothing is ever sent to any external server.
