name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        run: pnpm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Extract version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): bump to v${{ steps.version.outputs.value }} [skip ci]"
          git tag "v${{ steps.version.outputs.value }}"
          git push origin main --tags
