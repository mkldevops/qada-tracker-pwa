name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump || 'patch' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            BUMP="$BUMP_TYPE"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"
            BUMP="patch"

            if git log --format="%s" "$RANGE" | grep -qE "^[a-z]+(\(.+\))?!:" || \
               git log --format="%b" "$RANGE" | grep -qE "^BREAKING[ -]CHANGE[: ]"; then
              BUMP="major"
            elif git log --format="%s" "$RANGE" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            fi
          fi

          [[ "$BUMP" =~ ^(patch|minor|major)$ ]] || { echo "Invalid bump type: $BUMP"; exit 1; }
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version
        env:
          BUMP: ${{ steps.bump.outputs.type }}
        run: pnpm version "$BUMP" --no-git-tag-version

      - name: Extract version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit and tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): bump to v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Deploy to Coolify
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN_CLF }}" \
            "https://clf.fahari.pro/api/v1/deploy?uuid=hvq34qzm5g0jqdjcp2hdh1vn&force=false"
